# PeptideFold Model Configuration
model:
  name: "PeptideFold"
  version: "1.0"
  
architecture:
  sequence_dim: 128
  hidden_dim: 256
  num_heads: 8
  num_layers: 4
  dropout: 0.1
  
structure:
  coordinate_dim: 3
  confidence_bins: 50
  
training:
  batch_size: 8
  learning_rate: 0.001
  max_epochs: 100
  patience: 10
  
losses:
  distance_weight: 0.6
  angle_weight: 0.3
  confidence_weight: 0.1